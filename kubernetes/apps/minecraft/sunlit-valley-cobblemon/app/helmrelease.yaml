---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app sunlit-valley-cobblemon
spec:
  chartRef:
    kind: OCIRepository
    name: *app
  interval: 1h
  timeout: 10m0s
  values:
    fullnameOverride: *app
    replicaCount: 1
    image:
      repository: ghcr.io/itzg/minecraft-server
      tag: 2026.4.2-java21@sha256:55d2d31aed9848756c0051dea0b001a36ea0fa2afdce892f1aab0655a6dff87b
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
    resources:
      requests:
        cpu: 2000m
        memory: 8Gi
    podSecurityContext:
      runAsUser: 65534
      runAsGroup: 65534
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    startupProbe:
      enabled: true
    extraEnv:
      TZ: America/Detroit
      USE_MEOWICE_FLAGS: "true"
    persistence:
      dataDir:
        enabled: true
        existingClaim: *app
    minecraftServer:
      eula: true
      version: 1.20.1
      type: AUTO_CURSEFORGE
      icon: https://cdn2.steamgriddb.com/logo_thumb/804a8294a8f33203683b3e6ed46fe092.png
      memory: 8G
      serviceType: LoadBalancer
      difficulty: normal
      levelType: normal
      spawnProtection: 0
      gameMode: survival
      pvp: default
      onlineMode: true
      whitelist: "Jayce"
      ops: "Jayce"
      motd: "GULP im dead lock in"
      viewDistance: default
      worldSaveName: sunlit-cobblemon
      rcon:
        enabled: true
        existingSecret: *app
        secretKey: MINECRAFT_COBBLEMON_RCON_PASSWORD
      autoCurseForge:
        apiKey:
          existingSecret: *app
          secretKey: CURSEFORGE_API_KEY
        slug: society-sunlit-cobblemon
        filenameMatcher: "1.0.3-SSV4.0.6"

    mcbackup:
      enabled: true
      persistence:
        backupDir:
          existingClaim: sunlit-valley-cobblemon-backup

    serviceAnnotations:
      lbipam.cilium.io/ips: 192.168.20.42
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
