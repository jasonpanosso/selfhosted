---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app bookboss
  labels:
    app.kubernetes.io/name: *app
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: *app
    spec:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - image: ghcr.io/szinn/bookboss:v0.8.31@sha256:3bed78dabd1b2b33ee0ac039fce22e49adf1bbfeaa39b40f1e9bf7d4122c989d
          name: bookboss
          ports:
            - containerPort: &port 8080
              name: http
          env:
            - name: PG_DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bookboss
                  key: BOOKBOSS_DB_USERNAME
            - name: PG_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookboss
                  key: BOOKBOSS_DB_PASSWORD
            - name: BOOKBOSS__DATABASE__DATABASE_URL
              value: |
                postgres://$(PG_DATABASE_USERNAME):$(PG_DATABASE_PASSWORD)@pgcluster-rw.db.svc.cluster.local/bookboss
            - name: BOOKBOSS__FRONTEND__BASE_URL
              value: https://books.${domain}.${tld}
            - name: BOOKBOSS__IMPORT__BOOKDROP_PATH
              value: /ingest
            - name: BOOKBOSS__LIBRARY__LIBRARY_PATH
              value: /data/library
            - name: BOOKBOSS__ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: *app
                  key: BOOKBOSS_ENCRYPTION_SECRET
            - name: BOOKBOSS__METADATA__HARDCOVER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: *app
                  key: HARDCOVER_API_KEY
            - name: BOOKBOSS__OIDC__DISCOVERY_URL
              value: https://auth.${domain}.${tld}
            - name: BOOKBOSS__OIDC__CLIENT_ID
              value: *app
            - name: BOOKBOSS__OIDC__CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: *app
                  key: BOOKBOSS_OIDC_PASSWORD
          livenessProbe: &probes
            httpGet:
              path: /
              port: *port
            failureThreshold: 5
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe: *probes
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts:
            - name: ingest
              mountPath: /ingest
            - name: *app
              mountPath: /data
            - name: scratch
              mountPath: /tmp
      volumes:
        - name: *app
          persistentVolumeClaim:
            claimName: *app
        - name: ingest
          emptyDir: {}
        - name: scratch
          emptyDir: {}
