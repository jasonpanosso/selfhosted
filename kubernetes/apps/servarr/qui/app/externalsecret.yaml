---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qui
spec:
  secretStoreRef:
    name: bitwarden
    kind: ClusterSecretStore
  refreshPolicy: Periodic
  refreshInterval: 1h
  data:
    - secretKey: QUI_DB_USERNAME
      remoteRef:
        key: QUI_DB_USERNAME
    - secretKey: QUI_DB_PASSWORD
      remoteRef:
        key: QUI_DB_PASSWORD
    - secretKey: QUI_OIDC_PASSWORD
      remoteRef:
        key: QUI_OIDC_PASSWORD
    - secretKey: QUI_SESSION_SECRET
      remoteRef:
        key: QUI_SESSION_SECRET
  target:
    name: qui
    creationPolicy: Owner
