---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master-standalone/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: &app qbittorrent
  labels:
    app.kubernetes.io/name: *app
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: *app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: *app
    spec:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        # gluetun sidecar
        - image: ghcr.io/qdm12/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
          restartPolicy: Always
          lifecycle:
            postStart:
              exec:
                # https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/kubernetes.md
                command:
                  [
                    "/bin/sh",
                    "-c",
                    "(ip rule del table 51820; ip -6 rule del table 51820) || true",
                  ]
          livenessProbe: &probes
            exec:
              command:
                - /gluetun-entrypoint
                - healthcheck
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe: *probes
          name: gluetun
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              squat.ai/tun: "1"
            limits:
              memory: 256Mi
              squat.ai/tun: "1"
          ports:
            - name: http
              containerPort: 8080
            - name: mousehole
              containerPort: 5010
          env:
            - name: TZ
              value: Etc/UTC
            - name: FIREWALL_DEBUG
              value: "off"
            - name: FIREWALL_INPUT_PORTS
              value: "8080,5010"
            - name: FIREWALL_VPN_INPUT_PORTS
              valueFrom:
                secretKeyRef:
                  name: vpn
                  key: VPN_FIREWALL_INPUT_PORTS
            - name: SERVER_NAMES
              valueFrom:
                secretKeyRef:
                  name: vpn
                  key: VPN_SERVER_NAMES
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: 10.96.0.0/16,10.244.0.0/16
            - name: VPN_TYPE
              value: wireguard
            - name: PUID
              value: "65534"
            - name: PGID
              value: "65534"
          envFrom:
            - secretRef:
                name: vpn
          securityContext:
            allowPrivilegeEscalation: true
            runAsUser: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: false
            capabilities:
              add:
                - NET_ADMIN
      containers:
        - image: ghcr.io/home-operations/qbittorrent:5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
          name: *app
          env:
            - name: TZ
              value: Etc/UTC
            - name: QBT_TORRENTING_PORT
              valueFrom:
                secretKeyRef:
                  name: vpn
                  key: VPN_FIREWALL_INPUT_PORTS
            - name: QBT_WEBUI_PORT
              value: "8080"
          livenessProbe: &probes
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe: *probes
          resources:
            requests:
              cpu: 250m
              memory: 2Gi
            limits:
              memory: 4Gi
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /data/downloads
              subPath: downloads
            - name: scratch
              mountPath: /tmp
            - name: qbrr
              mountPath: /qbrr
        - image: docker.io/tmmrtn/mousehole:0.5.0@sha256:2fc02b12362581e60bfd6adba788bda9eda93f8f31ed089581eeabcee4518b0d
          name: mousehole
          env:
            - name: MOUSEHOLE_INSECURE_ALLOW_NO_AUTH
              value: "true"
            - name: MOUSEHOLE_ALLOWED_HOSTS
              value: mousehole.${domain}.${tld}
            - name: MOUSEHOLE_ALLOWED_ORIGINS
              value: https://mousehole.${domain}.${tld}
            - name: MOUSEHOLE_STATE_DIR_PATH
              value: /data
          livenessProbe: &probes
            httpGet:
              path: /
              port: 5010
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe: *probes
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: mousehole
              mountPath: /data
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: config
          persistentVolumeClaim:
            claimName: *app
        - name: mousehole
          persistentVolumeClaim:
            claimName: mousehole
        - name: scratch
          emptyDir: {}
        - name: qbrr
          image:
            reference: ghcr.io/buroa/qbrr:0.1.6@sha256:50baeb6633f144b7220777c56a8d501ea708d43043e28eb416d93e4e96efe06b
